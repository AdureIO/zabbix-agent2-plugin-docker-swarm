zabbix_export:
  version: '7.4'
  templates:
    - uuid: 07b4aabe4e0b47c8a5ae1f878a691ca2
      template: 'Docker Swarm'
      name: 'Docker Swarm'
      description: |
        Monitors Docker Swarm services, stacks, replicas and nodes via zabbix-agent2-plugin-docker-swarm.
        Deploy the plugin on every swarm node for full replica stats coverage.
        Items default to ZABBIX_ACTIVE. Change to ZABBIX_PASSIVE if your agents use passive checks.
      groups:
        - name: 'Templates/Applications'

      discovery_rules:

        # --- Services --------------------------------------------------------
        - uuid: 9b369f75ccb544f48618a40103f6e11e
          name: 'Docker Swarm Service Discovery'
          key: 'swarm.services.discovery'
          type: ZABBIX_ACTIVE
          delay: 5m
          lifetime: 1d
          lifetime_type: DELETE_AFTER
          description: 'Discovers all Swarm services with stable {#SERVICE.KEY} identifiers that survive redeploys.'
          item_prototypes:
            - uuid: afb6130a88cd4e40842a05b5ffc09b38
              name: 'Service {#SERVICE.NAME} ({#STACK.NAME}): desired replicas'
              key: 'swarm.service.replicas_desired[{#SERVICE.KEY}]'
              type: ZABBIX_ACTIVE
              delay: 60s
              value_type: UNSIGNED
              description: >
                Desired replica count. For global services this reflects eligible
                nodes after placement constraints. MaxReplicasPerNode is applied
                for replicated services.

            - uuid: 369ea3e0f50e44ed81f606ce0af875f1
              name: 'Service {#SERVICE.NAME} ({#STACK.NAME}): running replicas'
              key: 'swarm.service.replicas_running[{#SERVICE.KEY}]'
              type: ZABBIX_ACTIVE
              delay: 60s
              value_type: UNSIGNED

            - uuid: cba86556c4aa4cf7a3f05c9c6400b89f
              name: 'Service {#SERVICE.NAME} ({#STACK.NAME}): failed task count'
              key: 'swarm.service.restarts[{#SERVICE.KEY}]'
              type: ZABBIX_ACTIVE
              delay: 60s
              value_type: UNSIGNED
              description: >
                Count of failed (crashed) tasks in Docker task history (~5 per slot).
                Does not count intentional shutdowns or rolling-update replacements.
                Use change()>0 in triggers — do NOT use Delta storage type.

            - uuid: 1120b8ff0dc6441f896f52e33c4575bd
              name: 'Service {#SERVICE.NAME} ({#STACK.NAME}): last task start timestamp'
              key: 'swarm.service.last_restart[{#SERVICE.KEY}]'
              type: ZABBIX_ACTIVE
              delay: 60s
              value_type: UNSIGNED
              units: unixtime
              description: >
                Unix timestamp when the most recent running task started.
                Use change()>0 to detect that the service restarted.

          trigger_prototypes:
            - uuid: 95787bbe360a402bb104f006722e3092
              name: 'Service {#SERVICE.NAME} ({#STACK.NAME}): replica mismatch'
              expression: >
                last(/Docker Swarm/swarm.service.replicas_running[{#SERVICE.KEY}])
                <>
                last(/Docker Swarm/swarm.service.replicas_desired[{#SERVICE.KEY}])
              priority: WARNING
              description: 'Running replicas do not match the desired count.'
              manual_close: 'YES'

            - uuid: 6cf3368e05ae482d832cda96d80a4bcc
              name: 'Service {#SERVICE.NAME} ({#STACK.NAME}): task failure detected'
              expression: >
                change(/Docker Swarm/swarm.service.restarts[{#SERVICE.KEY}])>0
              priority: WARNING
              description: >
                A task for this service crashed recently.
                Docker retains only the last ~5 tasks per slot.
              manual_close: 'YES'

            - uuid: 9bbbcdf5720c41a397dcb6f4b330276c
              name: 'Service {#SERVICE.NAME} ({#STACK.NAME}): task restarted'
              expression: >
                change(/Docker Swarm/swarm.service.last_restart[{#SERVICE.KEY}])>0
              priority: INFO
              description: 'The most recent running task for this service changed (restart detected).'
              manual_close: 'YES'

        # --- Stacks ----------------------------------------------------------
        - uuid: df3b1c6e14b348a7b38fb057d0fbeddf
          name: 'Docker Compose Stack Discovery'
          key: 'swarm.stacks.discovery'
          type: ZABBIX_ACTIVE
          delay: 10m
          lifetime: 1d
          lifetime_type: DELETE_AFTER
          description: 'Discovers Docker Compose stacks grouped by com.docker.stack.namespace label.'
          item_prototypes:
            - uuid: 3d08974f78eb41fba4ae45f5e9df7723
              name: 'Stack {#STACK.NAME}: health status'
              key: 'swarm.stack.health[{#STACK.NAME}]'
              type: ZABBIX_ACTIVE
              delay: 60s
              value_type: TEXT
              description: >
                JSON: total_services, evaluated_services, healthy_services,
                unhealthy_services, unevaluated_services, health_percentage.

            - uuid: b9646e210372469e911e933b50a86e5b
              name: 'Stack {#STACK.NAME}: health percentage'
              key: 'swarm.stack.health_pct[{#STACK.NAME}]'
              type: DEPENDENT
              master_item:
                key: 'swarm.stack.health[{#STACK.NAME}]'
              value_type: FLOAT
              units: '%'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.health_percentage'

            - uuid: 0f7c56cc8b5c4dbaa6cef3cb4b794740
              name: 'Stack {#STACK.NAME}: unhealthy services'
              key: 'swarm.stack.unhealthy[{#STACK.NAME}]'
              type: DEPENDENT
              master_item:
                key: 'swarm.stack.health[{#STACK.NAME}]'
              value_type: UNSIGNED
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.unhealthy_services'

          trigger_prototypes:
            - uuid: eab6927c576440259bb2d2b009dd69cd
              name: 'Stack {#STACK.NAME}: unhealthy services detected'
              expression: >
                last(/Docker Swarm/swarm.stack.unhealthy[{#STACK.NAME}])>0
              priority: HIGH
              manual_close: 'YES'

            - uuid: f3b36003916a4c3d9f12ccbb28fc0c40
              name: 'Stack {#STACK.NAME}: health below 100%'
              expression: >
                last(/Docker Swarm/swarm.stack.health_pct[{#STACK.NAME}])<100
              priority: WARNING
              manual_close: 'YES'

        # --- Nodes -----------------------------------------------------------
        - uuid: 40cdab619bd84a9da3ce27cd7032b7c3
          name: 'Docker Swarm Node Discovery'
          key: 'swarm.nodes.discovery'
          type: ZABBIX_ACTIVE
          delay: 10m
          lifetime: 1d
          lifetime_type: DELETE_AFTER
          description: 'Discovers all nodes in the swarm. Run against any manager node.'
          item_prototypes:
            - uuid: 7382c757e39c4f64b92ff3e42e74a15c
              name: 'Node {#NODE.HOSTNAME}: status'
              key: 'swarm.node.status[{#NODE.ID}]'
              type: ZABBIX_ACTIVE
              delay: 60s
              value_type: TEXT
              description: 'JSON: hostname, role, availability, state, addr.'

            - uuid: 909c3f25440048b78523eb88e6faf375
              name: 'Node {#NODE.HOSTNAME}: availability'
              key: 'swarm.node.availability[{#NODE.ID}]'
              type: DEPENDENT
              master_item:
                key: 'swarm.node.status[{#NODE.ID}]'
              value_type: CHAR
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.availability'

            - uuid: bc83a1fb5b0442deb3642dd187831a19
              name: 'Node {#NODE.HOSTNAME}: state'
              key: 'swarm.node.state[{#NODE.ID}]'
              type: DEPENDENT
              master_item:
                key: 'swarm.node.status[{#NODE.ID}]'
              value_type: CHAR
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.state'

          trigger_prototypes:
            - uuid: ca9178f3bc404a71b01b7c07276fcc20
              name: 'Node {#NODE.HOSTNAME}: not ready'
              expression: >
                last(/Docker Swarm/swarm.node.state[{#NODE.ID}])<>"ready"
              priority: HIGH
              description: 'Node is not in ready state (may be down or disconnected).'
              manual_close: 'YES'

            - uuid: 8f6fca7f15a54585a4540790575dbc8e
              name: 'Node {#NODE.HOSTNAME}: availability changed from active'
              expression: >
                change(/Docker Swarm/swarm.node.availability[{#NODE.ID}])=1
                and
                last(/Docker Swarm/swarm.node.availability[{#NODE.ID}])<>"active"
              priority: WARNING
              description: 'Node availability changed to drain or pause.'
              manual_close: 'YES'

        # --- Replicas (per-node) ---------------------------------------------
        - uuid: 6d1a5171865a4100b4c219bbd0791f69
          name: 'Docker Swarm Replica Discovery'
          key: 'swarm.replicas.discovery'
          type: ZABBIX_ACTIVE
          delay: 5m
          lifetime: 1d
          lifetime_type: DELETE_AFTER
          description: >
            Discovers service replicas running on this node.
            Deploy the agent on every swarm node for full cluster coverage.
            Replica keys use stable slot numbers — history survives container restarts.
          item_prototypes:
            - uuid: 924b36658ebb446c8dd6748539444000
              name: 'Replica {#REPLICA.KEY}: stats'
              key: 'swarm.replica.stats[{#REPLICA.KEY}]'
              type: ZABBIX_ACTIVE
              delay: 60s
              value_type: TEXT
              description: >
                Master item. JSON: cpu_percent, cpu_ns, mem_bytes, mem_percent, mem_limit.
                All other replica items are dependent on this one.

            - uuid: b8e792e9ea994a06bdb0022133536c50
              name: 'Replica {#REPLICA.KEY}: CPU %'
              key: 'swarm.replica.cpu_pct[{#REPLICA.KEY}]'
              type: DEPENDENT
              master_item:
                key: 'swarm.replica.stats[{#REPLICA.KEY}]'
              value_type: FLOAT
              units: '%'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.cpu_percent'

            - uuid: 061febf374f847fb867c6f93fab1b670
              name: 'Replica {#REPLICA.KEY}: CPU nanoseconds (cumulative)'
              key: 'swarm.replica.cpu_ns[{#REPLICA.KEY}]'
              type: DEPENDENT
              master_item:
                key: 'swarm.replica.stats[{#REPLICA.KEY}]'
              value_type: UNSIGNED
              units: ns
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.cpu_ns'

            - uuid: 4c6700539cc248f6b13848932b808649
              name: 'Replica {#REPLICA.KEY}: memory (working set)'
              key: 'swarm.replica.mem_bytes[{#REPLICA.KEY}]'
              type: DEPENDENT
              master_item:
                key: 'swarm.replica.stats[{#REPLICA.KEY}]'
              value_type: UNSIGNED
              units: B
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.mem_bytes'

            - uuid: 652b63a1c2164bbab9cb5e3f37d16528
              name: 'Replica {#REPLICA.KEY}: memory %'
              key: 'swarm.replica.mem_pct[{#REPLICA.KEY}]'
              type: DEPENDENT
              master_item:
                key: 'swarm.replica.stats[{#REPLICA.KEY}]'
              value_type: FLOAT
              units: '%'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.mem_percent'

            - uuid: 52b771f4ce1e48e8b051e5a7584d07ae
              name: 'Replica {#REPLICA.KEY}: memory limit'
              key: 'swarm.replica.mem_limit[{#REPLICA.KEY}]'
              type: DEPENDENT
              master_item:
                key: 'swarm.replica.stats[{#REPLICA.KEY}]'
              value_type: UNSIGNED
              units: B
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.mem_limit'

          trigger_prototypes:
            - uuid: 9c42ec0264914816894513768595ab47
              name: 'Replica {#REPLICA.KEY}: high CPU usage'
              expression: >
                avg(/Docker Swarm/swarm.replica.cpu_pct[{#REPLICA.KEY}],5m)>80
              priority: WARNING
              description: 'Average CPU exceeded 80% for 5 minutes.'
              manual_close: 'YES'

            - uuid: a0ead6017ae34e9691fbe5577edb59a5
              name: 'Replica {#REPLICA.KEY}: high memory usage'
              expression: >
                last(/Docker Swarm/swarm.replica.mem_pct[{#REPLICA.KEY}])>90
                and
                last(/Docker Swarm/swarm.replica.mem_limit[{#REPLICA.KEY}])>0
              priority: WARNING
              description: 'Memory usage exceeded 90% of container limit.'
              manual_close: 'YES'
